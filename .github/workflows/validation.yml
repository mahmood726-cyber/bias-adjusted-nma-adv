name: Validation

on:
  push:
  pull_request:

jobs:
  validation:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Validate source-backed benchmark registry
        run: python scripts\validate_benchmark_registry.py --json

      - name: Write validation status
        run: python scripts\write_validation_status.py --output validation_status.json

      - name: Upload validation status artifact
        uses: actions/upload-artifact@v4
        with:
          name: validation-status
          path: validation_status.json
