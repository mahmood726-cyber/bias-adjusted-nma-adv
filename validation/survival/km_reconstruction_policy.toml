schema_version = "km_reconstruction_policy/v1"
source_policy = "clinicaltrials_gov + pubmed_abstract + open_access_paper only"
certification_effect = "none"
reuse_origin = "wasserstein_method_pattern_only"
required_source_type = "open_access_paper"
synthetic_ipd_policy = "blocked"
min_curve_points = 10
required_source_fields = [
  "study_id",
  "nct_id",
  "pmid",
  "source_type",
  "source_url",
  "access_statement",
  "source_snapshot_sha256",
  "article_identity_status",
  "open_access_status",
  "figure_label",
  "figure_page",
  "outcome_label",
  "active_treatment",
  "control_treatment",
  "risk_table_status",
  "reuse_origin",
]
blocked_hr_methods = [
  "text_synthetic_ipd",
  "text_hr_pair_fallback",
  "text_hr_only_fallback",
  "text_hr_fallback",
  "text_derived_only",
  "derived_event_rate",
  "median_ratio_fallback",
  "none",
]
blocked_orientation_methods = [
  "text_synthetic_ipd",
  "text_hr_pair_fallback",
  "text_hr_only_fallback",
  "text_hr_fallback",
  "text_only",
  "closest_to_1_prior",
  "none",
]
blocked_warning_terms = [
  "Synthetic IPD",
  "text-derived HR only",
  "Curve HR diverged from text HR",
  "using text HR",
  "no reliable curve pair",
  "curve extraction failed",
]
required_result_fields = [
  "hr",
  "hr_method",
  "orientation_method",
  "total_ipd_records",
  "curve1_times",
  "curve1_survivals",
  "curve2_times",
  "curve2_survivals",
  "n_curves_found",
  "verification_level",
  "verification_hash",
]
