schema_version = 1
checked_at = "2026-07-17"
purpose = "Minimum external reference targets required before platform modules can claim tier-one parity or production certification."
certification_rule = "A module cannot be marked reference_matched, simulation_validated, externally_reproduced, or production_certified unless required evidence_artifacts exist and are machine-verifiable."
allowed_evidence_sources = ["aact_clinicaltrials_gov", "clinicaltrials_gov", "ema_epar", "fda_review", "open_access_paper", "pactr_results", "pubmed_abstract", "who_ictrp_results"]

[[targets]]
id = "frequentist_nma_netmeta"
domain = "frequentist_nma"
module = "src/bias_nma_adv/model.py"
reference_method = "netmeta"
status = "planned"
acceptance_criteria = [
  "match treatment effects within deterministic tolerance on published two-arm and multi-arm networks",
  "match or explicitly document multi-arm covariance handling",
  "match disconnected-network fail-closed behavior",
  "compare inconsistency and contribution diagnostics where available",
]
evidence_artifacts = []

