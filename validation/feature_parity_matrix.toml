purpose = "Fine-grained feature-parity ledger against mature evidence-synthesis methods."
certification_effect = "none"
global_feature_parity_complete = false
source_boundary = "Feature parity evidence must use AACT/ClinicalTrials.gov records, public numeric ICTRP/PACTR result rows, PubMed abstracts, open-access papers, or public FDA/EMA regulatory review rows with numeric per-trial provenance; protocol-only registry rows cannot supply model-ready effects."

