domain = "pairwise_meta_analysis"
reference_methods = ["metafor", "meta"]
status = "reference_candidate"
evidence_artifacts = [
  "validation/reference_runs/pairwise_metafor_meta_reference.toml",
  "validation/reference_runs/pairwise_metafor_meta_output.json",
]
required_next_artifacts = [
  "continuous_outcome_reference_cases",
  "sparse_binary_reference_cases",
  "prediction_interval_reference_cases",
]
claim_limit = "This is a narrow reference candidate, not broad pairwise feature parity."
certification_effect = "none"

