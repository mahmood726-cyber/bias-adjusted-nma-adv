import_boundary = "Port source-policy screens, metric definitions, and manifests first. Existing extracted IPD or HR results must be revalidated against OA paper figures, PubMed abstracts, and typed identifiers before use."
next_gate = "Add the first OA KM source manifest with PMID/NCT/figure provenance, curve/IPD hashes, reproduced HR, and discrepancy."

