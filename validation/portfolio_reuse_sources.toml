  "faithful_guyot.py",
  "improved_hr_estimation.py",
  "improved_guyot_algorithm.py",
  "benchmark/km_metrics.py",
  "benchmark/tests/test_km_metrics.py",
]
reusable_assets = [
  "OA Kaplan-Meier figure screening patterns",
