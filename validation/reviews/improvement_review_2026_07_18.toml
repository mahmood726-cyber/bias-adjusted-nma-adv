schema_version = "improvement_review/v1"
checked_at = "2026-07-18"
certification_effect = "none"
overall_status = "passed_current_milestone_with_global_goal_blockers"
goal_statement = "Build toward a world-class evidence-synthesis platform that can beat tier-one workflows under the source limits of AACT/ClinicalTrials.gov, PubMed abstracts, open-access papers, public numeric ICTRP/PACTR result rows, and public FDA/EMA regulatory review rows with numeric per-trial provenance, with protocol-only registry rows used for metadata only."
thread_limit_note = "Fresh sub-agent spawning was constrained by the active thread limit; this ledger records a local role review and must not be represented as independent external reproduction."
source_boundary = "Effect evidence from AACT/ClinicalTrials.gov records, PubMed abstracts, open-access papers, public numeric ICTRP/PACTR result rows, and public FDA/EMA regulatory review rows with numeric per-trial provenance; protocol-only ICTRP, PACTR, and other registry rows cannot supply model-ready effects but can supply registered-primary-outcome anchors and completeness denominators."
global_goal_complete = false

[[rounds]]
id = "statistical_tier1_blocker_review"
reviewer = "statistical methods reviewer"
status = "passed_current_milestone"
scope = [
  "src/bias_nma_adv/node_splitting.py",
  "validation/feature_parity_matrix.toml",
  "validation/reference_runs",
  "validation/large_scale_validation.toml",
  "validation/mlnmr_source_coverage.toml",
  "validation/reviews/multiperson_review_2026_07_18.toml",
]
findings = [
  "The platform now has narrow source-backed reference candidates across pairwise meta-analysis, frequentist NMA, Bayesian NMA, dose-response, component NMA, DTA, and reported-HR survival pooling.",
  "The pairwise ledger now includes one source-backed low-control-event sparse binary `metafor::rma.uni` candidate and one reported-HR `metafor::predict` prediction-interval convention check, but continuous-outcome reference cases remain required before broad pairwise feature parity.",
  "The large-scale breadth counts exceed current benchmark, study-effect, NCT, PMID, simulation-job, simulation-iteration, positive-tau2, and passed-reference-run thresholds.",
  "The global statistical goal remains blocked because no feature family is broadly reference_matched and ML-NMR has a formal public-source exclusion rather than validation evidence.",
  "Reference-matched Stan/NUTS exists only as a narrow candidate artifact and cannot support broad Bayesian or multinma parity."
]
actions = [
  "Kept reference candidates scoped and non-certifying in the feature-parity matrix.",
  "Recorded the sparse-binary candidate as a narrow source-backed pairwise artifact without claiming zero-event, Mantel-Haenszel, or broad sparse-event parity.",
  "Recorded the prediction-interval candidate as a narrow source-backed convention check while preserving the local HKSJ floor disclosure.",
  "Kept large_scale_validation at partial_not_large_scale when formal ML-NMR exclusion is present.",
  "Recorded heatmap-ready GLS contribution matrices as local implementation progress, not CINeMA, ROB-MEN, or netheat parity.",
  "Added this latest improvement review so blocker status reflects the current branch instead of a stale review path."
]
remaining_blockers = [
  "Promote at least one feature family only after multiple source-backed reference cases cover ordinary, sparse, heterogeneous, and edge-case inputs.",
  "Find an admissible public trial-IPD ML-NMR fixture or keep ML-NMR excluded from large-scale real-domain completion.",
  "Add broader external reference artifacts for node splitting, netheat-like contribution displays, ROB-MEN/CINeMA mapping, and publication-bias methods."
]
verdict = "passed_current_milestone_not_global_goal"

