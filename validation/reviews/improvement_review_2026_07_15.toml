[[rounds]]
id = "html_delivery_regression_review"
reviewer = "HTML delivery reviewer"
status = "passed_current_milestone"
scope = [
  "validation/html_delivery_contract.toml",
  "src/bias_nma_adv/html_delivery_contract.py",
  "tests/test_html_delivery_contract.py",
  ".github/workflows/validation.yml",
]
findings = [
  "HTML can safely deliver static dashboards and artifact explorers when the data come from generated JSON/TOML artifacts.",
  "HTML-only replacement of statistical engines, source verification, reference adapters, hashes, or CI/certification gates would cause validation regression.",
]
actions = [
  "Added the HTML delivery contract with two HTML-allowed read-only surfaces and four backend-required function classes.",
  "Added tests that fail if statistical estimation or reference adapters are downgraded to HTML-only status.",
]
remaining_blockers = [
  "Build any future HTML dashboard as a read-only consumer of generated artifacts or connect it to a tested backend.",
