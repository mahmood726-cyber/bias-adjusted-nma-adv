  "src/bias_nma_adv/ingestion.py",
  "validation/grand_benchmark_plan.toml",
  "validation/real_benchmark_atlas.json",
]
findings = [
  "The source boundary now distinguishes effect-evidence sources from protocol-only registries.",
  "WHO ICTRP and other registries are allowed for protocol metadata only and rejected as model-ready extracted-effect sources.",
]
actions = [
  "Centralized effect-source and protocol-only source constants.",
  "Added tests that reject protocol-only sources in the proof-carrying effect ingestion path.",
  "Added the real benchmark atlas to summarize current source-backed benchmark coverage and non-claims.",
]
remaining_blockers = [
  "Add open-access full-paper/table extraction artifacts beyond PubMed abstract token checks.",
  "Add protocol discrepancy audits using WHO ICTRP or other registries without using them as effect sources.",
]
verdict = "passed_current_milestone_not_global_goal"

